apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dev-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/VK-Paints/vkpaints-argocd.git'
    targetRevision: main
    path: apps/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
